name: Azure Deploy (Infra + Static Site)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/azure-deploy.yml'
      - 'index.html'
      - 'dashboard_macroalgas_baias_clone.html'
      - '01_planejamento/**'
      - '02_sops/**'
      - '03_formularios/**'
      - '04_dados_campo/**'
      - '05_gis_mapas/**'
      - 'assets/**'
      - 'data/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-ufsc-ptm-dev-bs
  SWA_APP_LOCATION: /

jobs:
  deploy-infra:
    name: Deploy Infrastructure (Bicep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Resource Group
        run: |
          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location brazilsouth

      - name: Check Azure resource provider
        run: |
          deploy_backend=$(jq -r '.parameters.deployBackend.value // false' infra/main.parameters.json)
          namespaces=("Microsoft.Web")
          if [ "$deploy_backend" = "true" ]; then
            namespaces+=("Microsoft.Storage" "Microsoft.Insights" "Microsoft.DocumentDB")
          fi

          for namespace in "${namespaces[@]}"; do
            state=$(az provider show --namespace "$namespace" --query registrationState -o tsv)
            echo "$namespace: $state"
            if [ "$state" != "Registered" ]; then
              echo "$namespace is not registered. Ask a subscription owner to register it once before deploying."
              exit 1
            fi
          done

      - name: Deploy Bicep
        env:
          FIELD_API_KEY: ${{ secrets.FIELD_API_KEY }}
        run: |
          extra_parameters=()
          deploy_backend=$(jq -r '.parameters.deployBackend.value // false' infra/main.parameters.json)
          if [ "$deploy_backend" = "true" ] && [ -z "$FIELD_API_KEY" ]; then
            echo "FIELD_API_KEY secret is required when deployBackend=true."
            exit 1
          fi

          if [ -n "$FIELD_API_KEY" ]; then
            extra_parameters+=(apiKey="$FIELD_API_KEY")
          fi

          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json "${extra_parameters[@]}"

      - name: Read Static Web App name from parameters
        id: params
        run: |
          SWA_NAME=$(jq -r '.parameters.staticWebAppName.value' infra/main.parameters.json)
          FUNCTION_APP_NAME=$(jq -r '.parameters.functionAppName.value' infra/main.parameters.json)
          DEPLOY_BACKEND=$(jq -r '.parameters.deployBackend.value // false' infra/main.parameters.json)
          echo "swa_name=$SWA_NAME" >> "$GITHUB_OUTPUT"
          echo "function_app_name=$FUNCTION_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=$DEPLOY_BACKEND" >> "$GITHUB_OUTPUT"

      - name: Get Static Web App deployment token
        id: token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ steps.params.outputs.swa_name }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.apiKey -o tsv)
          echo "swa_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Static Web App content
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.swa_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.SWA_APP_LOCATION }}
          skip_app_build: true

      - name: Install API dependencies
        if: steps.params.outputs.deploy_backend == 'true'
        run: npm install --prefix api

      - name: Deploy Function API
        if: steps.params.outputs.deploy_backend == 'true'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.params.outputs.function_app_name }}
          package: api

      - name: Summary
        run: |
          echo "Infra deployed to resource group: $AZURE_RESOURCE_GROUP"
          echo "Static site content uploaded."
          echo "Backend deploy flag: ${{ steps.params.outputs.deploy_backend }}"
